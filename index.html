<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
        />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <link rel="stylesheet" href="style.css" />
        <title>Nasa APOD</title>
    </head>
    <body class="bg-gray-900 text-white">
        <main class="max-w-7xl mx-auto p-16">
            <h1 class="text-4xl mb-8">Nasa Astronomy Picture of the Day</h1>
            <form id="dateOfImageForm" class="mb-8 grid grid-cols-12 gap-4">
                <div class="flex flex-col space-y-1 col-span-10">
                    <label for="date" class="text-sm text-gray-500"
                        >Pildi kuupäev</label
                    >
                    <input
                        type="date"
                        name="date"
                        id="date"
                        class="bg-gray-800 text-white h-12 px-4"
                    />
                </div>
                <button
                    class="bg-gray-700 h-12 px-8 font-mono col-span-2 cursor-pointer"
                >
                    Otsi
                </button>
            </form>
            <section id="nasa-image-section"></section>
        </main>
        <script src="app.js" type="module"></script>
    </body>
</html>
